name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  packages: write
  security-events: write
jobs:
  dco:
    if: github.event_name == 'pull_request'
    uses: cloudsmith-cloud/cloudsmith-workflows/.github/workflows/dco-check.yml@v1.0.0
  build-test:
    uses: cloudsmith-cloud/cloudsmith-workflows/.github/workflows/dotnet-build-test.yml@v1.0.0
    with:
      # Integration tests require a live PostgreSQL instance not available on GitHub-hosted runners.
      # Validated in deployment smoke tests instead.
      run-integration-tests: false
    secrets: inherit
  docker:
    if: github.ref == 'refs/heads/main'
    needs: [build-test]
    uses: cloudsmith-cloud/cloudsmith-workflows/.github/workflows/docker-build-push.yml@v1.0.0
    with:
      image-name: 'cloudsmith-api'
    secrets: inherit
  trivy:
    if: github.ref == 'refs/heads/main'
    needs: [docker]
    uses: cloudsmith-cloud/cloudsmith-workflows/.github/workflows/trivy-scan.yml@v1.0.0
    with:
      image-ref: 'ghcr.io/cloudsmith-cloud/cloudsmith-api:latest'
    secrets: inherit